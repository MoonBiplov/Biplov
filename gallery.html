<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gallery | Biplov Devkota</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap");

/* ================= BASE STYLES ================= */
body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: url('bg.jpg') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
    overflow-x: hidden;
    /* Prevents highlighting and dragging of images */
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}
body::before {
    content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.7); z-index: -1;
}

/* ================= PASSWORD PAGE STYLES ================= */
#password-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 20000;
    transition: opacity 0.5s ease, visibility 0.5s;
}

#password-screen.hidden {
    opacity: 0;
    visibility: hidden;
}

.pw-back-btn {
    position: absolute;
    top: 40px;
    left: 5%;
    text-decoration: none;
    color: white;
    font-family: 'Orbitron';
    font-size: 11px;
    letter-spacing: 1px;
    opacity: 0.7;
    transition: 0.3s;
}
.pw-back-btn:hover { opacity: 1; transform: translateX(-5px); }

.pw-box {
    text-align: center;
    background: rgba(255, 255, 255, 0.05);
    padding: 40px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
}

.pw-box input {
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 12px 20px;
    color: white;
    font-family: 'Orbitron', sans-serif;
    text-align: center;
    border-radius: 8px;
    outline: none;
    transition: 0.3s;
}
.pw-box input:focus { border-color: #fff; }

.error-shake { animation: shake 0.4s; }
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
}

/* ================= GALLERY STYLES ================= */
.liquid-text { font-family: "Orbitron", sans-serif; color: white; text-shadow: 0 0 8px rgba(255,255,255,0.4); }

.header {
    width: 90%; max-width: 1000px; margin: 20px auto;
    display: flex; justify-content: space-between; align-items: center;
}
.back-home {
    text-decoration: none; color: white; font-family: 'Orbitron';
    font-size: 11px; letter-spacing: 1px; opacity: 0.7; transition: 0.3s;
}
.back-home:hover { opacity: 1; transform: translateX(-5px); }

.gallery-container {
    width: 90%; max-width: 1100px; margin: 0 auto 50px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 200px;
    gap: 20px;
}

.gallery-item {
    position: relative; overflow: hidden; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.gallery-item img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease-in-out;
    pointer-events: none; /* Disables right-click and dragging on images specifically */
}

.gallery-item:hover img { transform: scale(1.08); }
.featured-wrapper { position: relative; width: 100%; height: 100%; }
.featured-wrapper img { position: absolute; top: 0; left: 0; }

.item-tall { grid-row: span 2; }
.item-wide { grid-column: span 2; }
.item-featured { grid-column: span 2; grid-row: span 2; }

.item-overlay {
    position: absolute; bottom: 0; left: 0; width: 100%;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    padding: 15px; opacity: 0; transition: 0.4s;
    z-index: 10;
}
.gallery-item:hover .item-overlay { opacity: 1; }
.item-title { font-family: 'Orbitron'; font-size: 12px; letter-spacing: 1px; }

#lightbox {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
    display: none; justify-content: center; align-items: center; z-index: 10000;
}
#lightbox.active { display: flex; }
#lightbox img { max-width: 85%; max-height: 80%; border-radius: 12px; pointer-events: none; }

.lb-btn {
    position: absolute; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: white; border-radius: 50%; width: 50px; height: 50px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: 0.3s;
}
.lb-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
.lb-close { top: 25px; right: 25px; font-size: 20px; }
.lb-download { top: 25px; left: 25px; }

@media (max-width: 900px) {
    .gallery-container { grid-template-columns: repeat(2, 1fr); }
    .item-featured { grid-column: span 2; grid-row: span 1; }
}
</style>
</head>

        </a>
        <img id="lbImg" src="">

    <script>
        // --- Protection Logic (Right-Click & Inspect) ---
        document.addEventListener('contextmenu', event => event.preventDefault());

        document.onkeydown = function(e) {
            // Disable F12
            if(e.keyCode == 123) return false;
            // Disable Ctrl+Shift+I (Inspect)
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            // Disable Ctrl+Shift+C (Inspect Element)
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            // Disable Ctrl+Shift+J (Console)
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            // Disable Ctrl+U (View Source)
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };

        // --- Password Logic ---
        const passwordInput = document.getElementById('pw-input');
        const passwordScreen = document.getElementById('password-screen');
        const pwContainer = document.getElementById('pw-container');
        const correctPassword = "20090603";

        passwordInput.addEventListener('input', (e) => {
            if (e.target.value === correctPassword) {
                passwordScreen.classList.add('hidden');
                sessionStorage.setItem('gallery_access', 'true');
            } else if (e.target.value.length >= correctPassword.length) {
                pwContainer.classList.add('error-shake');
                setTimeout(() => {
                    pwContainer.classList.remove('error-shake');
                    e.target.value = "";
                }, 500);
            }
        });

        if(sessionStorage.getItem('gallery_access') === 'true') {
            passwordScreen.style.display = 'none';
        }

        // --- Original Gallery Logic ---
        const images = [];
        for(let i = 1; i <= 41; i++) {
            images.push(`img${i}.jpg`);
        }

        let featIdx = 0;
        const featImg = document.getElementById('featuredImg');
        const imgBack = document.getElementById('imgBack');

        setInterval(() => {
            featIdx = (featIdx + 1) % images.length;
            const nextImgSrc = images[featIdx];
            if(imgBack) imgBack.src = nextImgSrc;
            if(featImg) {
                featImg.style.opacity = 0;
                setTimeout(() => {
                    featImg.src = nextImgSrc;
                    featImg.style.opacity = 1;
                }, 800);
            }
        }, 4500);

        function openLightbox(index) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lbImg');
            const dl = document.getElementById('downloadLink');
            img.src = (index === 0) ? featImg.src : images[index];
            dl.href = img.src;
            lb.classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeLightbox();
        });
    </script>
