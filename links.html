/* ================= PROTECTION STYLES ================= */
* {

}

.link-btn, .back-btn, #pw-input {

}

body {

    overflow-x: hidden;
}
body::before {
    content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.75); z-index: -1;
}

.liquid-text { 
    font-family: "Orbitron", sans-serif; 
    color: white;

}

/* ================= LINKS CONTAINER ================= */
.links-card {
    width: 90%; 
    max-width: 400px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 30px;
    padding: 40px 25px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    margin: 20px;
}

.profile-img {
    width: 100px; height: 100px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.8);
    margin-bottom: 15px;
    object-fit: cover;
    transition: transform 0.3s ease;
    pointer-events: none;
}
.profile-img:hover { transform: scale(1.05); }

.username { font-size: 18px; margin-bottom: 8px; letter-spacing: 2px; }
.bio { font-size: 13px; opacity: 0.6; margin-bottom: 30px; line-height: 1.5; }

/* ================= BUTTONS ================= */
.link-btn {
    display: flex; align-items: center; justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 16px;
    margin-bottom: 15px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 15px;
    color: white;
    text-decoration: none;
    font-family: 'Orbitron';
    font-size: 11px;
    letter-spacing: 2px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-sizing: border-box;
    cursor: pointer;
}

.ai-btn {
    background: rgba(100, 150, 255, 0.15);
    border-color: rgba(100, 150, 255, 0.3);
}

.secure-btn {
    background: rgba(255, 100, 100, 0.15);
    border-color: rgba(255, 100, 100, 0.3);
}

.link-btn:hover {
    background: rgba(255, 255, 255, 0.2);
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    border-color: rgba(255,255,255,0.4);
}

.link-btn svg { width: 18px; height: 18px; fill: white; flex-shrink: 0; }

/* ================= PASSWORD OVERLAY SCREEN ================= */
#password-screen {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    display: flex; justify-content: center; align-items: center;
    z-index: 1000;
    opacity: 0; visibility: hidden;
    transition: all 0.4s ease;
}

#password-screen.show {
    opacity: 1; visibility: visible;
}

#pw-container {
    width: 85%; max-width: 320px;
    padding: 30px 20px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    position: relative;
}

.pw-title {
    font-family: 'Orbitron'; font-size: 13px; letter-spacing: 2px; margin-bottom: 20px; color: #ff6464;
}

#pw-input {
    width: 100%;
    padding: 12px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    color: white; text-align: center; font-size: 18px; letter-spacing: 6px;
    font-family: 'Orbitron'; outline: none; box-sizing: border-box;
    transition: border-color 0.3s;
}
#pw-input:focus { border-color: rgba(255, 100, 100, 0.5); }

.close-pw-btn {
    margin-top: 20px; display: inline-block; font-size: 10px;
    color: rgba(255,255,255,0.4); text-decoration: none; font-family: 'Orbitron';
    cursor: pointer; letter-spacing: 1px; transition: 0.3s;
}
.close-pw-btn:hover { color: #fff; }

/* Error Shake Keyframe */
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-10px); }
    40%, 80% { transform: translateX(10px); }
}
.error-shake { animation: shake 0.4s ease-in-out; border-color: rgba(255, 0, 0, 0.4) !important; }

/* ================= UTILS ================= */
.back-btn {
    margin-top: 20px;
    display: inline-block;
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    text-decoration: none;
    font-family: 'Orbitron';
    transition: 0.3s;
    letter-spacing: 1px;
}
.back-btn:hover { color: #fff; }

.copy-toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: #fff; color: #000; padding: 12px 24px;
    border-radius: 50px; font-size: 12px; font-weight: bold;
    opacity: 0; visibility: hidden;
    transition: all 0.4s ease;
    z-index: 100;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
.copy-toast.show { opacity: 1; visibility: visible; bottom: 40px; }
</style>

    <script>
        // --- Protection Logic (Right-Click & Inspect) ---
        document.addEventListener('contextmenu', event => event.preventDefault());

        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };

        // --- Password Security Engine ---
        const passwordInput = document.getElementById('pw-input');
        const passwordScreen = document.getElementById('password-screen');
        const pwContainer = document.getElementById('pw-container');
        const correctPassword = "20090428";
        
        // Target secure destination URL
        const secureDestinationUrl = "https://moonbiplov.github.io/Rekha/"; 

        function openPasswordScreen() {
            passwordScreen.classList.add('show');
            passwordInput.value = "";
            setTimeout(() => passwordInput.focus(), 200);
        }

        function closePasswordScreen() {
            passwordScreen.classList.remove('show');
        }

        passwordInput.addEventListener('input', (e) => {
            if (e.target.value === correctPassword) {
                // Successful verification
                closePasswordScreen();
                window.open(secureDestinationUrl, '_blank');
                e.target.value = "";
            } else if (e.target.value.length >= correctPassword.length) {
                // Failed attempt tracking (shakes container and resets input fields)
                pwContainer.classList.add('error-shake');
                setTimeout(() => {
                    pwContainer.classList.remove('error-shake');
                    e.target.value = "";
                }, 500);
            }
        });

        // --- Email Copy Engine ---
        function copyEmail() {
            const email = "biplovmoon@gmail.com";
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(email).then(() => showToast());
            } else {
                let textArea = document.createElement("textarea");
                textArea.value = email;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast();
                } catch (err) {
                    console.error('Fallback: Oops, unable to copy', err);
                }
                document.body.removeChild(textArea);
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }
    </script>
