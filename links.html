/* ================= PROTECTION STYLES ================= */
* {
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    -webkit-user-drag: none;
}

.link-btn, .back-btn {

/* ================= BASE STYLES ================= */
body {
    margin: 0; padding: 0;

    background: url('bg.jpg') no-repeat center center fixed;
    background-size: cover;

    min-height: 100vh;
}
body::before {
    content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.75); z-index: -1;
}

.liquid-text { 
    font-family: "Orbitron", sans-serif; 
    color: white; 
    text-shadow: 0 0 8px rgba(255,255,255,0.4); 
}

/* ================= LINKS CONTAINER ================= */
.links-card {
    width: 90%; 
    max-width: 400px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 30px;
    padding: 40px 25px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    margin: 20px;
}

.profile-img {
    width: 100px; height: 100px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.8);
    margin-bottom: 15px;
    object-fit: cover;
    transition: transform 0.3s ease;
    pointer-events: none;
}
.profile-img:hover { transform: scale(1.05); }

.username { font-size: 18px; margin-bottom: 8px; letter-spacing: 2px; }
.bio { font-size: 13px; opacity: 0.6; margin-bottom: 30px; line-height: 1.5; }

/* ================= BUTTONS ================= */
.link-btn {
    display: flex; align-items: center; justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 16px;
    margin-bottom: 15px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 15px;
    color: white;
    text-decoration: none;
    font-family: 'Orbitron';
    font-size: 11px;
    letter-spacing: 2px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-sizing: border-box;
    cursor: pointer;
}

.ai-btn {
    background: rgba(100, 150, 255, 0.15);
    border-color: rgba(100, 150, 255, 0.3);
}

.link-btn:hover {
    background: rgba(255, 255, 255, 0.2);
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    border-color: rgba(255,255,255,0.4);
}

.link-btn svg { width: 18px; height: 18px; fill: white; flex-shrink: 0; }

/* ================= UTILS ================= */
.back-btn {
    margin-top: 20px;
    display: inline-block;
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    text-decoration: none;
    font-family: 'Orbitron';
    transition: 0.3s;
    letter-spacing: 1px;
}
.back-btn:hover { color: #fff; }

.copy-toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: #fff; color: #000; padding: 12px 24px;
    border-radius: 50px; font-size: 12px; font-weight: bold;
    opacity: 0; visibility: hidden;
    transition: all 0.4s ease;
    z-index: 100;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
.copy-toast.show { opacity: 1; visibility: visible; bottom: 40px; }
</style>

    <script>
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };

        function copyEmail() {
            const email = "biplovmoon@gmail.com";
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(email).then(() => showToast());
            } else {
                let textArea = document.createElement("textarea");
                textArea.value = email;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast();
                } catch (err) {
                    console.error('Fallback: Oops, unable to copy', err);
                }
                document.body.removeChild(textArea);
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }
    </script>
