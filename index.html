// --- 1. Enhanced Anti-DevTools Anti-Tamper Logic ---
(function() {
    // Block right click context menu cleanly
    document.addEventListener('contextmenu', event => event.preventDefault());

    // Block common shortcut key combinations comprehensively
    document.addEventListener('keydown', function(e) {
        if (
            e.keyCode === 123 || // F12
            (e.ctrlKey && e.shiftKey && e.keyCode === 73) || // Ctrl+Shift+I
            (e.ctrlKey && e.shiftKey && e.keyCode === 74) || // Ctrl+Shift+J
            (e.ctrlKey && e.shiftKey && e.keyCode === 67) || // Ctrl+Shift+C
            (e.ctrlKey && e.keyCode === 85) // Ctrl+U (View Source)
        ) {
            e.preventDefault();
            return false;
        }
    });

    // Infinite debugger execution trap to stall open DevTools panels
    function devToolsTrap() {
        function trap(i) {
            if (("" + i / i).length !== 1 || i % 20 === 0) {
                (function() {}).constructor("debugger")();
            } else {
                (function() {}).constructor("debugger")();
            }
            trap(++i);
        }
        try {
            trap(0);
        } catch (e) {}
    }

    // Repeated execution to loop endlessly if panel states are active
    setInterval(devToolsTrap, 50);
})();

function updateLiveAge() {
    const now = new Date();
    
    let years = now.getFullYear() - birthDate.getFullYear();
    let birthMonth = birthDate.getMonth();
    let currentMonth = now.getMonth();
    
    if (currentMonth < birthMonth || (currentMonth === birthMonth && now.getDate() < birthDate.getDate())) {
        years--;
    }
    
    let lastBirthday = new Date(birthDate);
    lastBirthday.setFullYear(birthDate.getFullYear() + years);
    
    let msDifference = now.getTime() - lastBirthday.getTime();
    
    const msInDay = 24 * 60 * 60 * 1000;
    const msInHour = 60 * 60 * 1000;
    const msInMin = 60 * 1000;
    const msInSec = 1000;
    
    let days = Math.floor(msDifference / msInDay);
    msDifference %= msInDay;
    
    let hours = Math.floor(msDifference / msInHour);
    msDifference %= msInHour;
    
    let minutes = Math.floor(msDifference / msInMin);
    msDifference %= msInMin;
    
    let seconds = Math.floor(msDifference / msInSec);
    let milliseconds = msDifference % msInSec;
    
    let padHrs = String(hours).padStart(2, '0');
    let padMins = String(minutes).padStart(2, '0');
    let padSecs = String(seconds).padStart(2, '0');
    let padMs = String(milliseconds).padStart(3, '0');
    
    document.getElementById("live-age").innerHTML = 
        `${years} YEARS ${days} DAYS • ${padHrs}H ${padMins}M ${padSecs}S <span style="font-size:11px; opacity:0.6;">${padMs}</span> • OLD CREATOR`;
    
    requestAnimationFrame(updateLiveAge);
}

requestAnimationFrame(updateLiveAge);

// Slider Gallery Logic
const projects = [
    { img: "q1.jpg", title: "" },
    { img: "q2.jpg", title: "" },
    { img: "q3.jpg", title: "" }
];
let currentIndex = 0;
const sliderEl = document.getElementById("mainSlider");

function updateUI() {
    sliderEl.style.backgroundImage = `url('${projects[currentIndex].img}')`;
    document.getElementById("projectTitle").innerText = projects[currentIndex].title;
}

setInterval(() => {
    currentIndex = (currentIndex + 1) % projects.length;
    updateUI();
}, 3000);

// Modal Controls
function openLightbox() {
    document.getElementById("lightbox").classList.add("active");
    document.getElementById("lightboxImg").src = projects[currentIndex].img;
}
function closeLightbox() {
    document.getElementById("lightbox").classList.remove("active");
}

function openModel() {
    document.getElementById("model-modal").classList.add("active");
}
function closeModel() {
    document.getElementById("model-modal").classList.remove("active");
}

updateUI();
</script>
