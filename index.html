    <style>
@import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap");

/* ================= PRELOADER ================= */
#loader-wrapper {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #0a0a0a;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 99999;
    transition: opacity 0.8s ease, visibility 0.8s;
}
.loader-logo {
    font-family: "Orbitron", sans-serif;
    font-size: 2.5rem; letter-spacing: 10px; color: #fff;
    margin-bottom: 20px; white-space: nowrap; overflow: hidden;
    border-right: 3px solid #fff; width: 0;
    animation: typing 1.5s steps(6, end) forwards, blink 0.75s step-end infinite;
}
.loader-bar { width: 250px; height: 2px; background: rgba(255, 255, 255, 0.1); position: relative; border-radius: 4px; overflow: hidden; }
.loader-bar::after { content: ''; position: absolute; left: -100%; width: 100%; height: 100%; background: #fff; animation: fill-bar 3s linear forwards; }

@keyframes typing { from { width: 0 } to { width: 220px; } }
@keyframes blink { from, to { border-color: transparent } 50% { border-color: #fff; } }
@keyframes fill-bar { 0% { left: -100%; } 100% { left: 0%; } }
.loader-hidden { opacity: 0; visibility: hidden; }

/* ================= BASE STYLES ================= */
body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: url('bg.jpg') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
    overflow-x: hidden;
}
body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.6);
    z-index: -1;
}

.glass-panel {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px) saturate(160%);
    -webkit-backdrop-filter: blur(15px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    margin-bottom: 25px;
    width: 90%;
    max-width: 1000px;
}

.liquid-text { font-family: "Orbitron", sans-serif; color: white; text-shadow: 0 0 8px rgba(255,255,255,0.4); }
.fade-in-up { opacity: 0; transform: translateY(30px); transition: 1s ease-out; }
.fade-in-up.visible { opacity: 1; transform: translateY(0); }

/* ================= INTEREST TAGS ================= */
.interest-tag { 
    background: rgba(255,255,255,0.08); 
    padding: 12px 20px; 
    border-radius: 15px; 
    font-size: 11px; 
    border: 1px solid rgba(255,255,255,0.1); 
    font-family: "Orbitron"; 
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    overflow: hidden;
    min-width: 80px;
    text-align: center;
}

.interest-tag .hover-text {
    position: absolute;
    top: 100%; left: 0; width: 100%; height: 100%;
    background: #fff; color: #000;
    display: flex; align-items: center; justify-content: center;
    transition: 0.3s ease;
    font-weight: bold;
    font-size: 9px;
    padding: 0 5px;
}

.interest-tag:hover { transform: translateY(-5px); border-color: #fff; }
.interest-tag:hover .default-text { opacity: 0; transform: translateY(-20px); }
.interest-tag:hover .hover-text { top: 0; }

.baby-blue-tag {
    background: rgba(137, 207, 240, 0.2) !important;
    border-color: rgba(137, 207, 240, 0.4) !important;
    color: #89CFF0 !important;
}
.baby-blue-tag .hover-text { background: #89CFF0 !important; color: #000 !important; }

/* ================= MODALS & LIGHTBOX ================= */
#lightbox, #model-modal { 
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(0,0,0,0.95); backdrop-filter: blur(30px); 
    display: none; justify-content: center; align-items: center; z-index: 10000; 
}
#lightbox.active, #model-modal.active { display: flex; }
#lightbox img { max-width: 85%; max-height: 75%; border-radius: 12px; }

.sketchfab-embed-wrapper { width: 90%; max-width: 800px; height: 500px; border-radius: 20px; overflow: hidden; background: #000; }
.sketchfab-embed-wrapper iframe { width: 100%; height: 100%; }

.close-btn { position:absolute; top:20px; right:20px; background:none; border:none; color:#fff; font-size:30px; cursor:pointer; z-index: 10001; }

/* ================= SOCIALS & HEADER ================= */
.social-capsule {
    position: fixed; left: 20px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 18px; padding: 22px 10px;
    background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px; z-index: 999;
}
.social-link { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: 0.3s; }
.social-link svg { width: 18px; height: 18px; fill: rgba(255,255,255,0.6); }
.social-link:hover { background: rgba(255,255,255,0.1); transform: scale(1.1); }
.social-link:hover svg { fill: #fff; }

.slider-container { position: relative; width: 90%; max-width: 1000px; aspect-ratio: 16 / 9; margin: 0 auto 25px; overflow: hidden; border-radius: 24px; }
#mainSlider { width: 100%; height: 100%; background-size: cover; background-position: center; transition: background-image 0.8s; cursor: zoom-in; }

.header { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; margin-top: 20px; }
.nav-links ul { list-style: none; display: flex; gap: 25px; }
.nav-links a { text-decoration: none; font-size: 11px; letter-spacing: 2px; color: white; opacity: 0.7; font-family: 'Orbitron'; }

@media (max-width: 768px) { 
    .social-capsule { display: none; }
    .sketchfab-embed-wrapper { height: 350px; }
}
</style>
</head>

const birthDate = new Date("2009-06-03");
function updateAge() {
    const today = new Date();
    let age = today.getFullYear() - birthDate.getFullYear();
    if (today.getMonth() < birthDate.getMonth() || (today.getMonth() === birthDate.getMonth() && today.getDate() < birthDate.getDate())) age--;

}

    updateUI();
}, 3000);

// Modal Controls
function openLightbox() {
    document.getElementById("lightbox").classList.add("active");
    document.getElementById("lightboxImg").src = projects[currentIndex].img;
}
function closeLightbox() { document.getElementById("lightbox").classList.remove("active"); }

function openModel() { document.getElementById("model-modal").classList.add("active"); }
function closeModel() { document.getElementById("model-modal").classList.remove("active"); }

updateUI();
</script>
