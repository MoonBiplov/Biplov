// Age Calculator
const birthDate = new Date("2009-06-03");
function updateAge() {
    const today = new Date();
    let age = today.getFullYear() - birthDate.getFullYear();
    if (
        today.getMonth() < birthDate.getMonth() ||
        (today.getMonth() === birthDate.getMonth() && today.getDate() < birthDate.getDate())
    ) {
        age--;
    }
    document.getElementById("age").innerText = age;
}
updateAge();

const sliderEl = document.getElementById("mainSlider");

    sliderEl.style.backgroundImage = `url('${projects[currentIndex].img}')`;
    document.getElementById("projectTitle").innerText = projects[currentIndex].title;
}

setInterval(() => {
    currentIndex = (currentIndex + 1) % projects.length;
    updateUI();
}, 3000);

// Modal Controls
function openLightbox() {
