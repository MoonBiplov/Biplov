<style>
@import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap");

/* ================= PRELOADER ================= */
#loader-wrapper {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #0a0a0a;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 99999;
    transition: opacity 0.8s ease, visibility 0.8s;
}
.loader-logo {
    font-family: "Orbitron", sans-serif;
    font-size: 2.5rem; letter-spacing: 10px; color: #fff;
    margin-bottom: 20px; white-space: nowrap; overflow: hidden;
    border-right: 3px solid #fff; width: 0;
    animation: typing 1.5s steps(6, end) forwards, blink 0.75s step-end infinite;
}
.loader-bar { width: 250px; height: 2px; background: rgba(255, 255, 255, 0.1); position: relative; border-radius: 4px; overflow: hidden; }
.loader-bar::after { content: ''; position: absolute; left: -100%; width: 100%; height: 100%; background: #fff; animation: fill-bar 3s linear forwards; }

@keyframes typing { from { width: 0 } to { width: 220px; } }
@keyframes blink { from, to { border-color: transparent } 50% { border-color: #fff; } }
@keyframes fill-bar { 0% { left: -100%; } 100% { left: 0%; } }
.loader-hidden { opacity: 0; visibility: hidden; }

/* ================= BASE STYLES ================= */
body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: url('bg.jpg') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
    overflow-x: hidden;
}
body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.6);
    z-index: -1;
}

.glass-panel {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px) saturate(160%);
    -webkit-backdrop-filter: blur(15px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    margin-bottom: 25px;
    width: 90%;
    max-width: 1000px;
}

.liquid-text { font-family: "Orbitron", sans-serif; color: white; text-shadow: 0 0 8px rgba(255,255,255,0.4); }
.fade-in-up { opacity: 0; transform: translateY(30px); transition: 1s ease-out; }
.fade-in-up.visible { opacity: 1; transform: translateY(0); }

/* ================= VERTICAL SOCIAL CAPSULE (LEFT) ================= */
.social-capsule {
    position: fixed;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 18px;
    padding: 22px 10px;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 40px;
    z-index: 999;
}
.social-link {
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; transition: all 0.3s ease;
}
.social-link svg { width: 18px; height: 18px; fill: rgba(255,255,255,0.6); }
.social-link:hover { background: rgba(255,255,255,0.1); transform: scale(1.1); }
.social-link:hover svg { fill: #fff; }

/* ================= GALLERY SLIDER ================= */
.slider-container {
    position: relative; width: 90%; max-width: 1000px;
    aspect-ratio: 16 / 9; margin: 0 auto 25px; 
    overflow: hidden; border-radius: 24px;
}
#mainSlider {
    width: 100%; height: 100%;
    background-size: cover; background-position: center;
    transition: background-image 0.8s ease-in-out; cursor: zoom-in;
}

/* ================= LIGHTBOX ================= */
#lightbox {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.95); backdrop-filter: blur(30px);
    display: none; justify-content: center; align-items: center; z-index: 10000;
}
#lightbox.active { display: flex; }
#lightbox img { max-width: 85%; max-height: 75%; border-radius: 12px; transition: opacity 0.4s; }

.lb-btn {
    position: absolute; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    color: white; border-radius: 50%; width: 50px; height: 50px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; z-index: 10001; transition: 0.3s;
}
.lb-btn:hover { background: rgba(255,255,255,0.2); }
.lb-prev { left: 25px; top: 50%; transform: translateY(-50%); }
.lb-next { right: 25px; top: 50%; transform: translateY(-50%); }
.lb-close { top: 25px; right: 25px; }
.lb-download { top: 25px; left: 25px; }
.lb-download svg { width: 20px; height: 20px; fill: white; }

/* ================= HEADER ================= */
.header { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; margin-top: 20px; }
.nav-links ul { list-style: none; display: flex; gap: 25px; margin: 0; padding: 0; }
.nav-links a { text-decoration: none; font-size: 11px; letter-spacing: 2px; color: white; opacity: 0.7; transition: 0.3s; font-family: 'Orbitron'; }
.nav-links a:hover { opacity: 1; text-shadow: 0 0 8px #fff; }

.skill-tag { background: rgba(255,255,255,0.08); padding: 6px 14px; border-radius: 20px; font-size: 10px; border: 1px solid rgba(255,255,255,0.15); font-family: "Orbitron"; letter-spacing: 1px; }
.skill-tag.clickable { cursor: pointer; transition: 0.3s; }
.skill-tag.clickable:hover { background: rgba(255,255,255,0.2); border-color: #fff; }

.angle-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); 
    color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; z-index: 10;
    display: flex; align-items: center; justify-content: center; transition: 0.3s;
}
.angle-btn:hover { background: rgba(255,255,255,0.15); }
.prev { left: 20px; } .next { right: 20px; }

@media (max-width: 768px) {
    .social-capsule { display: none; }
    .header { padding: 15px 20px; }
}
</style>
</head>

<script>
document.addEventListener("DOMContentLoaded", () => {
    setTimeout(() => {
        document.getElementById("loader-wrapper").classList.add("loader-hidden");
        setTimeout(() => document.getElementById("main-content").classList.add("visible"), 200);
    }, 3000); 
});

const birthDate = new Date("2009-06-03");
function updateAge() {
    const today = new Date();
    let age = today.getFullYear() - birthDate.getFullYear();
    if (today.getMonth() < birthDate.getMonth() || (today.getMonth() === birthDate.getMonth() && today.getDate() < birthDate.getDate())) age--;
    document.getElementById("age").innerText = age;
}
updateAge();

const projects = [{ img: "q1.jpg", title: "PROJECT ALPHA" }, { img: "q2.jpg", title: "NEBULA UI" }, { img: "q3.jpg", title: "VOID MOBILE" }];
let currentIndex = 0;
const sliderEl = document.getElementById("mainSlider");
const lbImg = document.getElementById("lightboxImg");
const pTitle = document.getElementById("projectTitle");

function updateUI() {
    const p = projects[currentIndex];
    sliderEl.style.backgroundImage = `url('${p.img}')`;
    pTitle.innerText = p.title;
    if(document.getElementById("lightbox").classList.contains("active")) {
        lbImg.style.opacity = 0;
        setTimeout(() => {
            lbImg.src = p.img;
            lbImg.style.opacity = 1;
            document.getElementById("lbDownloadLink").href = p.img;
        }, 200);
    }
}

function changeSlide(dir) {
    currentIndex = (currentIndex + dir + projects.length) % projects.length;
    updateUI();
}

let slideTimer = setInterval(() => changeSlide(1), 3000);
function manualChange(dir) {
    clearInterval(slideTimer);
    changeSlide(dir);
    slideTimer = setInterval(() => changeSlide(1), 3000);
}

function openLightbox() { document.getElementById("lightbox").classList.add("active"); updateUI(); }
function closeLightbox() { document.getElementById("lightbox").classList.remove("active"); }

updateUI();
</script>
